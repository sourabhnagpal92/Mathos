
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- viewport-fit=cover is critical for Dynamic Island on both phones -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />

    <!-- PWA / iOS -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="MATH_OS" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#050a0f" />

    <!-- Icons -->
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/icon-192.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/icon-192.png" />
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- Splash screens -->
    <!-- iPhone 14 Pro Max: 1290x2796 @3x -->
    <link rel="apple-touch-startup-image" href="/icons/splash-1290x2796.png"
      media="(device-width: 430px) and (device-height: 932px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" />
    <!-- iPhone 16 / 15 / 14: 1179x2556 @3x (390pt wide) -->
    <link rel="apple-touch-startup-image" href="/icons/splash-1179x2556.png"
      media="(device-width: 390px) and (device-height: 844px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" />
    <!-- iPhone 16 Pro Max: 1320x2868 @3x (440pt wide) -->
    <link rel="apple-touch-startup-image" href="/icons/splash-1320x2868.png"
      media="(device-width: 440px) and (device-height: 956px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" />

    <title>MATH_OS</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html {
        height: 100%;
        /* Prevent zoom on input focus on iOS */
        font-size: 16px;
      }
      body, #root {
        height: 100%;
        min-height: 100vh;
        min-height: -webkit-fill-available;
        background: #050a0f;
        overscroll-behavior: none;
        -webkit-tap-highlight-color: transparent;
        -webkit-touch-callout: none;
        user-select: none;
        /* Prevent text size adjustment on rotation */
        -webkit-text-size-adjust: 100%;
      }
      #root {
        /* Safe area insets for Dynamic Island on all iPhones */
        padding-top: env(safe-area-inset-top);
        padding-bottom: env(safe-area-inset-bottom);
        padding-left: env(safe-area-inset-left);
        padding-right: env(safe-area-inset-right);
      }
      /* Prevent pull-to-refresh interfering with scroll */
      body { overscroll-behavior-y: none; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
